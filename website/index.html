<!-- outputs/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Charting the Grind</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #1f2937;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 0.25rem;
      font-size: 2.2rem;
    }

    .subtitle {
      margin-top: 0;
      margin-bottom: 2rem;
      color: #6b7280;
      font-size: 1.1rem;
    }

    .chart-card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    iframe {
      width: 100%;
      height: 820px;
      border: none;
    }

    .note {
      margin-top: 1rem;
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>Charting the Grind</h1>
    <p class="subtitle">
      A small visual exploration of my study habits.
    </p>

    <section class="chart-card">
      <iframe
        src="chart.html"
        title="Productivity by time of day and location">
      </iframe>

      <p class="note">
        This interactive chart shows how productivity changes across different
        combinations of time of day and location. Bubble size represents total
        study hours, while color shows productivity relative to the other combinations.
      </p>
    </section>
  </main>
</body>
</html>
